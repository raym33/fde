name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: make compile

      - name: Run labs quality gate
        run: make labs-quality VENV_PYTHON=python

      - name: Run pytest
        run: make test VENV_PYTHON=python

      - name: Run labs smoke test
        run: make smoke VENV_PYTHON=python
